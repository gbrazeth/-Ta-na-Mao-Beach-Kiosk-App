{
  "services": [
    {
      "type": "web",
      "runtime": "node",
      "name": "ta-na-mao-api",
      "plan": "free",
      "buildCommand": "cd api && npm install && npx prisma generate",
      "startCommand": "cd api && npx ts-node src/server.ts",
      "envVars": [
        { "key": "DATABASE_URL", "sync": false },
        { "key": "JWT_SECRET", "sync": false },
        { "key": "PORT", "value": "3000" },
        { "key": "NODE_ENV", "value": "production" },
        { "key": "CORS_ORIGINS", "sync": false }
      ]
    }
  ]
}
